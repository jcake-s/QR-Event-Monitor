<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Event Monitor System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="page-wrapper">
        <header>
            <div class="header-icon">🎟️</div>
            <div class="header-text">
                <h1>Event Monitor</h1>
                <p>Real-time guest entry &amp; exit tracker</p>
            </div>
        </header>

        <main class="dashboard-container">
            <section class="glass-card scanner-section">
                <h2><span class="section-dot dot-blue"></span> Live Scanner</h2>
                <div id="reader"></div>
                <div id="scanner-message">Ready to scan</div>
            </section>

            <section class="glass-card log-section">
                <h2><span class="section-dot dot-purple"></span> Activity Log</h2>
                <div id="status-card" class="card-neutral">
                    <div class="log-icon" id="log-icon">📡</div>
                    <h3 id="log-guest-name">No Scan Detected</h3>
                    <p id="log-guest-id">Scan a guest QR code to begin tracking.</p>
                    <div id="log-badge" class="badge">Awaiting Scan</div>
                    <p id="log-time"></p>
                </div>
            </section>
        </main>

        <section class="glass-card directory-section">
            <div class="directory-header">
                <h2><span class="section-dot dot-green"></span> Guest Directory</h2>
                <div class="admin-controls">
                    <button id="export-csv-btn" class="admin-btn">
                        <span class="btn-icon">↓</span> Export CSV
                    </button>
                    <button id="reset-session-btn" class="admin-btn danger">
                        <span class="btn-icon">↺</span> Reset Session
                    </button>
                </div>
            </div>

            <div class="metrics-container">
                <div class="metric-card metric-total">
                    <p class="metric-label">Total Guests</p>
                    <p id="total-guests" class="metric-value">0</p>
                </div>
                <div class="metric-card metric-inside">
                    <p class="metric-label">Inside</p>
                    <p id="inside-count" class="metric-value">0</p>
                </div>
                <div class="metric-card metric-outside">
                    <p class="metric-label">Outside / Absent</p>
                    <p id="outside-count" class="metric-value">0</p>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="guest-table">
                    <thead>
                        <tr>
                            <th>Guest ID</th>
                            <th>Full Name</th>
                            <th>Status</th>
                            <th>Last Action</th>
                            <th>Override</th>
                        </tr>
                    </thead>
                    <tbody id="guest-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
